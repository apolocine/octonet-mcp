<VirtualHost *:80>
    ServerName mcp.amia.fr
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName mcp.amia.fr
    ServerAdmin drmdh@msn.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mcp.amia.fr/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mcp.amia.fr/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    Header always set Access-Control-Allow-Headers "Content-Type, Authorization, x-api-key, mcp-session-id, Accept"

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:14500/
    ProxyPassReverse / http://127.0.0.1:14500/

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/(.*) ws://127.0.0.1:14500/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/mcp.amia.fr-error.log
    CustomLog ${APACHE_LOG_DIR}/mcp.amia.fr-access.log combined
</VirtualHost>
</IfModule>
